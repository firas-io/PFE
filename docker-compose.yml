name: habitflow-backend

# ─── Réseau partagé — le frontend le rejoint via : docker run --network habitflow-net
networks:
  habitflow-net:
    name: habitflow-net
    driver: bridge

volumes:
  habitflow-data:
  ldap-data:
  ldap-config:

services:

  # ── API Fastify ────────────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: habitflow-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongo:27017/habitflow
      - JWT_SECRET=votre_secret_jwt_tres_securise
      - ADMIN_EMAIL=admin@habitflow.com
      - ADMIN_PASSWORD=Admin123!
      - LDAP_ENABLED=true
      - LDAP_URL=ldap://openldap:389
      - LDAP_BASE_DN=dc=habitflow,dc=local
      - LDAP_BIND_DN=cn=admin,dc=habitflow,dc=local
      - LDAP_BIND_PASSWORD=admin
      - LDAP_USER_FILTER=(mail={{username}})
      - LDAP_USER_DN_TEMPLATE=uid={{uid}},ou=people,dc=habitflow,dc=local
      - LDAP_MANAGERS_OU=ou=managers,dc=habitflow,dc=local
      - LDAP_ADMIN_EMAIL=admin@habitflow.local
    depends_on:
      mongo:
        condition: service_healthy
      openldap:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:5000', r => process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - habitflow-net
    restart: unless-stopped

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:latest
    container_name: habitflow-mongo
    ports:
      - "27018:27017"
    volumes:
      - habitflow-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - habitflow-net

  # ── OpenLDAP ───────────────────────────────────────────────────────────────
  openldap:
    image: osixia/openldap:1.5.0
    container_name: habitflow-ldap
    command: ["--copy-service"]
    environment:
      - LDAP_ORGANISATION=HabitFlow
      - LDAP_DOMAIN=habitflow.local
      - LDAP_ADMIN_PASSWORD=admin
      - LDAP_REMOVE_CONFIG_AFTER_SETUP=false
    ports:
      - "389:389"
      - "636:636"
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
      - ./docker/ldap:/container/service/slapd/assets/config/bootstrap/ldif/custom
    healthcheck:
      test: ["CMD-SHELL", "ldapsearch -x -H ldap://localhost:389 -D 'cn=admin,dc=habitflow,dc=local' -w 'admin' -b 'dc=habitflow,dc=local' -s base '(objectClass=*)' >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - habitflow-net
    restart: unless-stopped

  # ── phpLDAPadmin (UI LDAP) ─────────────────────────────────────────────────
  phpldapadmin:
    image: osixia/phpldapadmin:0.9.0
    container_name: habitflow-phpldapadmin
    environment:
      - PHPLDAPADMIN_LDAP_HOSTS=openldap
      - PHPLDAPADMIN_HTTPS=false
    ports:
      - "8080:80"
    depends_on:
      openldap:
        condition: service_healthy
    networks:
      - habitflow-net
    restart: unless-stopped

  # ── LDAP seed (run-once) ───────────────────────────────────────────────────
  ldap-seed:
    image: osixia/openldap:1.5.0
    container_name: habitflow-ldap-seed
    depends_on:
      openldap:
        condition: service_healthy
    volumes:
      - ./docker/ldap/50-seed.ldif:/seed/50-seed.ldif:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ldapadd -x -H ldap://openldap:389
      -D 'cn=admin,dc=habitflow,dc=local'
      -w 'admin'
      -f /seed/50-seed.ldif
      -c || true"
    networks:
      - habitflow-net
    restart: "no"
